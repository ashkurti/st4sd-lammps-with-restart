entrypoint:
  entry-instance: "lammps"
  execute:
    - target: <entry-instance>
      args:
        lammps-cpus: "2"
        lammps-gpus: "2"
        input.file.in: input/file.in
        input.confin.data: input/confin.data
        input.restart-config: input/restart_iterations.txt
        ld-library-path: /usr/local/lammps/sm80/lib:/usr/local/cuda/lib:/usr/local/cuda/lib64:/usr/local/fftw/lib
        path-env: /usr/local/lammps/bin:/usr/local/lammps/sm80/bin:/usr/local/openmpi/bin:/usr/local/ucx/bin:/usr/local/nvidia/bin:/usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        pvc-output-dir: /tmp/st4sd-volumes/pvc-md-simulation-inputs-pvc-rwx/lammps_with_restart_data
  output:
    - name: lammps-log
      data-in: <entry-instance/lammps>/run_logs:output
      description: LAMMPS run logs
    - name: restart-files
      data-in: <entry-instance/lammps>/restart_outputs:output
      description: Restart snapshots directory

workflows:
  - signature:
      name: lammps
      parameters:
        - name: input.file.in
        - name: input.confin.data
        - name: input.restart-config
        - name: lammps-cpus
        - name: lammps-gpus
        - name: ld-library-path
          default: /usr/local/lammps/sm80/lib:/usr/local/cuda/lib:/usr/local/cuda/lib64:/usr/local/fftw/lib
        - name: path-env
          default: /usr/local/lammps/bin:/usr/local/lammps/sm80/bin:/usr/local/openmpi/bin:/usr/local/ucx/bin:/usr/local/nvidia/bin:/usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: pvc-output-dir
          default: /tmp/st4sd-volumes/pvc-md-simulation-inputs-pvc-rwx/lammps_with_restart_data
    steps:
      lammps: lammps-single-file
    execute:
      - target: <lammps>
        args:
          file.in: "%(input.file.in)s:ref"
          file.confin: "%(input.confin.data)s:ref"
          file.restart-config: "%(input.restart-config)s:ref"
          cpus: "%(lammps-cpus)s"
          gpus: "%(lammps-gpus)s"
          ld-library-path: "%(ld-library-path)s"
          path-env: "%(path-env)s"
          pvc-output-dir: "%(pvc-output-dir)s"

components:
  - signature:
      name: lammps-single-file
      parameters:
        - name: cpus
        - name: gpus
        - name: file.in
        - name: file.confin
        - name: file.restart-config
        - name: ld-library-path
          default: /usr/local/lammps/sm80/lib:/usr/local/cuda/lib:/usr/local/cuda/lib64:/usr/local/fftw/lib
        - name: path-env
          default: /usr/local/lammps/bin:/usr/local/lammps/sm80/bin:/usr/local/openmpi/bin:/usr/local/ucx/bin:/usr/local/nvidia/bin:/usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        - name: pvc-output-dir
          default: /tmp/st4sd-volumes/pvc-md-simulation-inputs-pvc-rwx/lammps_with_restart_data
    command:
      executable: bash
      arguments: |
        -c "
          set -euo pipefail
          cp %(file.in)s file.in
          cp %(file.confin)s confin.data
          cp %(file.restart-config)s restart_iterations.txt
          readonly gpu_count=${1:-$(nvidia-smi --list-gpus | wc -l)}
          mkdir -p %(pvc-output-dir)s
          restart_iterations=$(tr -d '[:space:]' < restart_iterations.txt)
          if ! [[ ${restart_iterations} =~ ^[0-9]+$ ]]; then
            echo \"restart_iterations.txt must contain a non-negative integer\" >&2
            exit 1
          fi
          echo \"Running LAMMPS on ${gpu_count} GPUs...\"
          lmp_gpu -h | grep KOKKOS
          cleanup_outputs() {
            rm -f ./*.dat ./*.lmptrj ./*.lammpstrj ./confout.data
          }
          append_file_to_pvc() {
            local local_file=$1
            local dest_file=$2
            if [ -f \"${local_file}\" ]; then
              cat \"${local_file}\" >> \"${dest_file}\"
            fi
          }
          publish_outputs() {
            local run_label=$1
            cp \"${run_label}\" %(pvc-output-dir)s/\"${run_label}\"
            mkdir -p restart_outputs
            mkdir -p run_logs
            cp \"${run_label}\" run_logs/
            for dat_file in ./*.dat; do
              [ -f \"${dat_file}\" ] || continue
              local dat_name=$(basename \"${dat_file}\")
              cp \"${dat_file}\" %(pvc-output-dir)s/\"${run_label%.log}\"_\"${dat_name}\"
              append_file_to_pvc \"${dat_file}\" %(pvc-output-dir)s/\"${dat_name}\"
            done
            for traj_file in ./*.lmptrj ./*.lammpstrj; do
              [ -f \"${traj_file}\" ] || continue
              local traj_name=$(basename \"${traj_file}\")
              cp \"${traj_file}\" %(pvc-output-dir)s/\"${run_label%.log}\"_\"${traj_name}\"
              append_file_to_pvc \"${traj_file}\" %(pvc-output-dir)s/\"${traj_name}\"
            done
            if [ -f confout.data ]; then
              cp confout.data %(pvc-output-dir)s/\"${run_label%.log}\"_confout.data
              cp confout.data %(pvc-output-dir)s/confout_latest.data
            fi
          }
          run_lammps() {
            local input_file=$1
            local log_file=$2
            cleanup_outputs
            mpirun -np ${gpu_count} lmp_gpu -sf gpu -pk gpu ${gpu_count} -in ${input_file} -log ${log_file}
          }
          run_lammps file.in lammps_fresh.log
          publish_outputs lammps_fresh.log
          iter=1
          while [ ${iter} -le ${restart_iterations} ]; do
            latest_restart=$(find . -maxdepth 1 -type f -name 'restart.*' | sort -V | tail -n 1)
            if [ -z \"${latest_restart}\" ]; then
              echo \"No restart.* file was produced after iteration $((iter-1))\" >&2
              exit 1
            fi
            awk -v restart_file=\"$(basename \"${latest_restart}\")\" '
              BEGIN { replaced=0 }
              /^[[:space:]]*read_data[[:space:]]+/ && replaced==0 { print \"read_restart \" restart_file; replaced=1; next }
              /^[[:space:]]*#read_restart[[:space:]]+/ && replaced==0 { print \"read_restart \" restart_file; replaced=1; next }
              { print }
              END { if (replaced==0) print \"read_restart \" restart_file }
            ' file.in > restart_${iter}.in
            run_lammps restart_${iter}.in lammps_restart_${iter}.log
            publish_outputs lammps_restart_${iter}.log
            iter=$((iter + 1))
          done
          find . -maxdepth 1 -type f -name 'restart.*' -exec cp {} restart_outputs/ \;
          cp run_logs/* %(pvc-output-dir)s/
          find . -maxdepth 1 -type f -name 'restart.*' -exec cp {} %(pvc-output-dir)s/ \;
        "
      expandArguments: none
      environment:
        LD_LIBRARY_PATH: "%(ld-library-path)s"
        PATH: "%(path-env)s"
    resourceManager:
      config:
        backend: kubernetes
      kubernetes:
        image: hartreeworkflowsolutions.azurecr.io/stfc_lammps_custom_gpu_mat_chem:latest
        image-pull-secret: pull-acr-hartree-workflowsolutions-secret
    resourceRequest:
      numberThreads: "%(cpus)s"
      gpus: "%(gpus)s"
